services:
  db:
    image: postgres:16
    container_name: shopease-db
    environment:
      POSTGRES_USER: shopease
      POSTGRES_PASSWORD: shopease123
      POSTGRES_DB: shopease
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopease"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: shopease-backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: shopease
      DB_PASSWORD: shopease123
      DB_NAME: shopease
      JWT_SECRET: shopease_dev_secret_change_this_later
      PORT: 5050
    ports:
      - "5050:5050"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: shopease-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data:
